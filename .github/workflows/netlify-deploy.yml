name: Deploy to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Verify static launch files
        run: node tools/verify-static-launch.mjs

      - name: Verify content safety
        run: node tools/verify-content-safety.mjs

      - name: Verify visual asset provenance
        run: node tools/verify-asset-provenance.mjs

      - name: Build public deploy directory
        run: node tools/build-public.mjs

      - name: Verify public deploy directory
        run: node tools/verify-public-build.mjs

      - name: Deploy static site to Netlify
        run: npx --yes netlify-cli deploy --prod --dir dist --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
