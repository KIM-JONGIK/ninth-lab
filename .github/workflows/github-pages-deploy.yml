name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify static launch files
        run: node tools/verify-static-launch.mjs

      - name: Verify content safety
        run: node tools/verify-content-safety.mjs

      - name: Verify no-repeat phrase decks
        run: node tools/verify-phrase-deck.mjs

      - name: Verify visual asset provenance
        run: node tools/verify-asset-provenance.mjs

      - name: Build public deploy directory
        run: node tools/build-public.mjs

      - name: Verify public deploy directory
        run: node tools/verify-public-build.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
